services:
  backend:
    build:
      context: ./backend
    environment:
      PORT: "8080"
      DB_PATH: /data/letspaste.db
      JWT_SECRET: ${JWT_SECRET:-please-change-this-secret}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-changeme123}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
    volumes:
      - letspaste_data:/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend
    ports:
      - "${APP_PORT:-8088}:80"
    restart: unless-stopped

volumes:
  letspaste_data:
