services:
  letspaste:
    image: widayn/letspaste:latest
    container_name: letspaste
    environment:
      PORT: "8080"
      DB_PATH: /data/letspaste.db
      JWT_SECRET: ${JWT_SECRET:-please-change-this-secret}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-changeme123}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      STATIC_DIR: /app/public
    volumes:
      - letspaste_data:/data
    ports:
      - "${APP_PORT:-8088}:8080"
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    restart: unless-stopped

  watchtower:
    image: containrrr/watchtower:latest
    container_name: letspaste-watchtower
    environment:
      DOCKER_API_VERSION: ${DOCKER_API_VERSION:-1.40}
      WATCHTOWER_LABEL_ENABLE: "true"
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_POLL_INTERVAL: ${WATCHTOWER_POLL_INTERVAL:-300}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped

volumes:
  letspaste_data:
